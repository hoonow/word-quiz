<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>영단어 시험 — Week 20</title>
<style>
:root{--ink:#2b2520;--paper:#faf6ee;--card:#fffdf8;--rust:#c1502e;--navy:#3a4d6b;--gold:#d9a441;--line:#e6ddc9;--good:#4a7c4e;--bad:#b3413a;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:'Georgia',serif;background:var(--paper);color:var(--ink);}
.wrap{max-width:1180px;margin:0 auto;padding:14px 12px 60px;}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:3px solid var(--ink);margin-bottom:14px;}
header h1{font-size:1.1rem;margin:0;}
.stamp{font-size:.7rem;border:1px solid var(--ink);padding:3px 8px;border-radius:3px;}
.progress-bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:16px;}
.progress-fill{height:100%;background:var(--rust);transition:width .3s;}
.stage-label{font-size:.75rem;color:var(--navy);font-weight:bold;letter-spacing:.5px;text-transform:uppercase;}
.stage-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;}
.prev-btn{background:none;border:1px solid var(--line);border-radius:8px;padding:6px 12px;
  font-size:.78rem;font-weight:bold;color:var(--navy);cursor:pointer;font-family:inherit;}
.prev-btn:disabled{opacity:.35;cursor:not-allowed;}

.top-btns{display:flex;gap:10px;margin-bottom:12px;}
.top-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 8px;border-radius:10px;border:none;font-size:.9rem;font-weight:bold;cursor:pointer;}
.top-btn.sound{background:var(--rust);color:#fff;}
.top-btn.hint{background:var(--navy);color:#fff;}
.top-btn:disabled{opacity:.6;cursor:not-allowed;}
.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

.main-area{display:flex;gap:14px;margin-bottom:14px;align-items:flex-start;flex-wrap:wrap;}
.left-panel{flex:1 1 360px;min-width:300px;}
.mid-panel{flex:1 1 260px;min-width:240px;}
.side-panel{flex:1 1 200px;min-width:200px;}

.canvas-wrap{position:relative;border:2px solid var(--line);border-radius:10px;background:#fff;overflow:hidden;margin-bottom:8px;}
#handCanvas{display:block;width:100%;height:190px;touch-action:none;cursor:crosshair;}
.canvas-clear{position:absolute;top:7px;right:7px;background:rgba(255,255,255,.92);
  border:1px solid var(--line);border-radius:6px;padding:5px 10px;font-size:.8rem;cursor:pointer;font-family:inherit;}
.answer-reveal{text-align:center;padding:10px;border-radius:8px;background:#eef2fa;
  border:2px solid var(--navy);display:none;margin-bottom:8px;}
.answer-reveal .lbl{font-size:.68rem;color:var(--navy);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.answer-reveal .wrd{font-size:1.9rem;font-weight:bold;color:var(--navy);letter-spacing:2px;}
.grade-row{display:none;gap:10px;margin-bottom:8px;}
.grade-btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:.95rem;font-weight:bold;cursor:pointer;font-family:inherit;}
.grade-btn.ok{background:var(--good);color:#fff;}
.grade-btn.no{background:var(--bad);color:#fff;}
.check-row{margin-bottom:8px;}
.check-btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:.95rem;font-weight:bold;
  cursor:pointer;background:var(--ink);color:#fff;font-family:inherit;}
.next-btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:.95rem;font-weight:bold;
  cursor:pointer;background:var(--navy);color:#fff;font-family:inherit;display:none;}

.slot-group{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px;}
.slot-row{margin-bottom:9px;}
.slot-row:last-child{margin-bottom:0;}
.slot-lbl{font-size:.66rem;font-weight:bold;letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px;}
.lbl-syn{color:var(--rust);}
.lbl-ant{color:var(--navy);}
.lbl-pos{color:var(--good);}
.slot-zone{min-height:34px;border:1.5px dashed var(--line);border-radius:8px;
  display:flex;align-items:center;justify-content:center;background:#fff;
  cursor:pointer;transition:border-color .1s,background .1s;padding:2px;}
.slot-zone:hover,.slot-zone.drag-over{border-color:var(--navy);background:#f0f4fa;}
.slot-zone.has-chip{border-style:solid;border-color:var(--navy);}
.slot-zone.reject-flash{animation:reject .3s ease;}
@keyframes reject{0%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}100%{transform:translateX(0)}}
.slot-zone.locked{pointer-events:none;}
.slot-zone.slot-correct{border-style:solid;border-color:var(--good);background:#eef8ee;}
.slot-zone.slot-wrong{border-style:solid;border-color:var(--bad);background:#fdecea;}
.slot-ans-tag{font-size:.65rem;color:var(--bad);margin-left:6px;font-weight:bold;white-space:nowrap;}

.confirm-row{display:none;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;}
.confirm-check{display:flex;align-items:center;gap:8px;font-size:.82rem;margin-bottom:9px;cursor:pointer;}
.confirm-check input{width:18px;height:18px;flex:0 0 auto;}
.confirm-row .check-btn:disabled{opacity:.5;cursor:not-allowed;}

.completed-box{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 10px;margin-bottom:10px;}
.completed-lbl{font-size:.63rem;font-weight:bold;color:#8a7f6a;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.completed-list{display:flex;flex-wrap:wrap;gap:5px;max-height:120px;overflow-y:auto;}
.completed-chip{font-size:.7rem;background:#eef2fa;color:var(--navy);border-radius:12px;padding:3px 8px;font-weight:bold;white-space:nowrap;}
.completed-empty{font-size:.72rem;color:#c5bba8;}

.pool-section{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 10px;margin-bottom:12px;}
.pool-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:8px;flex-wrap:nowrap;}
.pool-row:last-child{margin-bottom:0;}
.pool-lbl{font-size:.63rem;font-weight:bold;text-transform:uppercase;color:#8a7f6a;white-space:nowrap;min-width:54px;padding-top:5px;}
.pool-chips-inner{display:flex;flex-wrap:wrap;gap:5px;}

.chip{display:inline-flex;align-items:center;padding:5px 9px;border-radius:20px;font-size:.82rem;
  font-weight:bold;cursor:grab;user-select:none;border:1.5px solid transparent;white-space:nowrap;touch-action:none;}
.chip:active{cursor:grabbing;}
.chip.pos-chip{background:#e8f5e4;color:var(--good);border-color:var(--good);}
.chip.sa-chip{background:#fef0e6;color:#8b4c1e;border-color:#c47840;}
.chip.selected{box-shadow:0 0 0 3px var(--gold);transform:scale(1.06);}
.chip.ghost-chip{position:fixed;pointer-events:none;z-index:9999;opacity:.88;cursor:grabbing;}
.chip.in-slot{font-size:.78rem;padding:4px 8px;cursor:grab;}
.chip-remove{opacity:.55;font-weight:bold;margin-left:1px;}
.sel-badge{font-size:.72rem;color:var(--gold);text-align:center;min-height:16px;margin-top:4px;}
.start-btn{margin-top:16px;background:var(--rust);color:#fff;border:none;
  padding:15px 32px;border-radius:10px;font-size:1rem;font-weight:bold;cursor:pointer;}

/* ── Result Table ── */
.result-header{text-align:center;padding:14px 0 10px;}
.result-score-big{font-size:2.8rem;font-weight:bold;color:var(--rust);line-height:1;}
.score-pills{display:flex;justify-content:center;gap:10px;margin:10px 0;}
.pill{font-size:.82rem;padding:5px 14px;border-radius:20px;font-weight:bold;}
.pill.dict{background:#eef2fa;color:var(--navy);}
.pill.match{background:#f0faf0;color:var(--good);}
.res-table-wrap{overflow-x:auto;margin-top:4px;}
.res-table{width:100%;border-collapse:collapse;font-size:.8rem;}
.res-table th{padding:8px 6px;border-bottom:2px solid var(--ink);font-size:.7rem;
  text-align:center;font-weight:bold;letter-spacing:.3px;white-space:nowrap;}
.res-table th:nth-child(2){text-align:left;}
.res-table td{padding:6px 5px;border-bottom:1px solid var(--line);text-align:center;vertical-align:middle;}
.res-table td:nth-child(2){text-align:left;font-weight:bold;}
.res-table tr:nth-child(even) td{background:#f5f0e6;}
.num{color:#8a7f6a;font-size:.75rem;}
.spell-ok{color:var(--good);}
.spell-no{color:var(--bad);}
.cell-ok{color:var(--good);font-weight:bold;}
.cell-no{color:var(--bad);}
.cell-ans{display:block;font-size:.72rem;color:var(--good);font-weight:bold;}
.cell-na{color:#c5bba8;}
.restart-btn{display:block;margin:16px auto 0;background:var(--navy);color:#fff;border:none;
  padding:12px 28px;border-radius:10px;font-size:.95rem;font-weight:bold;cursor:pointer;}

/* ── Photo upload screen ── */
.photo-screen{text-align:center;padding:20px 8px;}
.photo-hint{color:#5c5345;font-size:.85rem;line-height:1.7;max-width:460px;margin:8px auto 0;}
.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:380px;margin:18px auto;}
.photo-slot{position:relative;aspect-ratio:1;border:2px dashed var(--line);border-radius:10px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;overflow:hidden;}
.photo-slot img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-slot .plus{font-size:2.2rem;color:#c5bba8;}
.photo-remove{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;
  border:none;border-radius:50%;width:22px;height:22px;font-size:.8rem;cursor:pointer;line-height:1;}

/* ── History (past results) ── */
.history-btn{background:none;border:1px solid var(--ink);border-radius:8px;padding:5px 10px;
  font-size:.75rem;font-weight:bold;color:var(--ink);cursor:pointer;font-family:inherit;}
.history-overlay{display:none;position:fixed;inset:0;background:rgba(30,25,20,.55);
  align-items:center;justify-content:center;z-index:10000;padding:16px;}
.history-modal{background:var(--paper);border-radius:12px;max-width:480px;width:100%;
  max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 30px rgba(0,0,0,.3);}
.history-head{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:2px solid var(--ink);}
.history-head h3{margin:0;font-size:1rem;}
.history-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--ink);}
.history-body{overflow-y:auto;padding:10px 16px 16px;}
.history-row{border-bottom:1px solid var(--line);padding:9px 0;}
.history-row:last-child{border-bottom:none;}
.history-row-top{display:flex;justify-content:space-between;font-size:.85rem;font-weight:bold;}
.history-row-top span{font-weight:normal;color:#8a7f6a;font-size:.78rem;}
.history-row-score{font-size:.8rem;color:#5c5345;margin-top:3px;}
.history-empty{text-align:center;color:#8a7f6a;font-size:.85rem;padding:20px 0;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📝 영단어 시험</h1>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="history-btn" onclick="showHistory()">📊 기록</button>
      <span class="stamp">WEEK 20</span>
    </div>
  </header>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div id="app"></div>
</div>
<div class="history-overlay" id="historyOverlay">
  <div class="history-modal">
    <div class="history-head"><h3>지난 시험 기록</h3><button class="history-close" onclick="closeHistory()">✕</button></div>
    <div class="history-body" id="historyBody"></div>
  </div>
</div>
<script>
const WORDS=[
  {word:"treasure",   pos:"noun", example:"The pirate's treasure is hidden on the island.",                              syn:null,          ant:null},
  {word:"accumulate", pos:"verb", example:"My family and I were surprised at all the things we accumulated.",            syn:"gather",      ant:null},
  {word:"adopt",      pos:"verb", example:"My mom and dad adopted a puppy and a cat from the animal shelter.",          syn:null,          ant:"abandon"},
  {word:"wealth",     pos:"noun", example:"Aiden acquired great wealth and many houses in the town.",                    syn:"assets",      ant:"debt"},
  {word:"reprove",    pos:"verb", example:"The father reproved his son for making a mess.",                              syn:"reprimand",   ant:"praise"},
  {word:"hesitate",   pos:"verb", example:"Sue typed some words and then hesitated before typing again.",                syn:"pause",       ant:null},
  {word:"triumph",    pos:"noun", example:"Becoming a famous actress was Ashley's personal triumph.",                     syn:"success",     ant:"failure"},
  {word:"sacrifice",  pos:"verb", example:"I sacrificed my playtime during recess and helped a classmate study.",       syn:null,          ant:null},
  {word:"appetizing", pos:"adj.", example:"That steak with vegetables was very appetizing.",                             syn:"tasty",       ant:null},
  {word:"compound",   pos:"noun", example:"The homemade juice is a compound of various fresh fruits.",                   syn:"combination", ant:null},
  {word:"pleasantry", pos:"noun", example:"The two businessmen shared pleasantries.",                                    syn:null,          ant:null},
  {word:"model",      pos:"noun", example:"You can see models of old ships in the museum.",                              syn:"sample",      ant:null},
  {word:"compare",    pos:"verb", example:"Some people compare the singer's voice to the voice of an angel.",           syn:null,          ant:"contrast"},
  {word:"label",      pos:"verb", example:"I labeled all the folders by subject.",                                       syn:"mark",        ant:null},
  {word:"directions", pos:"noun", example:"We were lost, so I looked at my phone's navigation system for directions.", syn:null,          ant:null},
];
const SA_ALL=['gather','assets','reprimand','pause','success','tasty','combination','sample','mark','abandon','debt','praise','failure','contrast'];
const POS_VALS=['noun','verb','adj.','adv.'];
const isPOS=v=>POS_VALS.includes(v);

// ── Type restriction ──────────────────────────────────────────
function canDrop(slotId,isP){
  const t=slotId.split('-').pop(); // syn | ant | pos
  if(t==='pos'&&!isP) return false;   // SA chip → POS slot ✗
  if(t!=='pos'&&isP)  return false;   // POS chip → SA slot ✗
  return true;
}

// ── TTS ──────────────────────────────────────────────────────
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const audioCache={};
function googleTTSUrl(t){return `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(t)}&tl=en-US&client=tw-ob`;}
async function getDictUrl(word){
  if(word in audioCache) return audioCache[word];
  try{
    const res=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
    if(!res.ok)return(audioCache[word]=null);
    const data=await res.json();let url='';
    for(const e of data){
      for(const p of(e.phonetics||[])){if(p.audio&&p.audio.includes('-us')){url=p.audio;break;}}
      if(!url)for(const p of(e.phonetics||[])){if(p.audio){url=p.audio;break;}}
      if(url)break;
    }
    if(url&&url.startsWith('//'))url='https:'+url;
    return(audioCache[word]=url||null);
  }catch{return(audioCache[word]=null);}
}
function playUrl(url){return new Promise(r=>{const a=new Audio(url);a.onended=r;a.onerror=r;a.play().catch(r);});}
async function wSpeak(text){
  return new Promise(r=>{
    const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.85;
    const vs=speechSynthesis.getVoices();
    const b=vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'));
    if(b)u.voice=b;u.onend=r;u.onerror=r;speechSynthesis.cancel();speechSynthesis.speak(u);
  });
}
async function playOnce(text){
  // 1. Google Translate TTS
  const ok=await new Promise(resolve=>{
    const a=new Audio(googleTTSUrl(text));let done=false;
    const fin=s=>{if(!done){done=true;resolve(s);}};
    a.oncanplay=()=>a.play().then(()=>{}).catch(()=>fin(false));
    a.onended=()=>fin(true);a.onerror=()=>fin(false);
    setTimeout(()=>fin(false),4000);a.load();
  });
  if(ok)return;
  // 2. Dict API (single word)
  if(!text.includes(' ')){const du=await getDictUrl(text);if(du){await playUrl(du);return;}}
  // 3. Web Speech
  await wSpeak(text);
}
async function speakWord3x(word,btnId){
  const btn=document.getElementById(btnId),sp=btn?.querySelector('.spin');
  if(btn)btn.disabled=true;if(sp)sp.style.display='inline-block';
  for(let i=0;i<3;i++){await playOnce(word);if(i<2)await wait(500);}
  if(btn)btn.disabled=false;if(sp)sp.style.display='none';
}
async function speakOnce(text,btnId){
  const btn=document.getElementById(btnId),sp=btn?.querySelector('.spin');
  if(btn)btn.disabled=true;if(sp)sp.style.display='inline-block';
  await playOnce(text);
  if(btn)btn.disabled=false;if(sp)sp.style.display='none';
}

// ── Canvas ────────────────────────────────────────────────────
let cvs=null,ctx=null,isDrawing=false;
function initCanvas(){
  cvs=document.getElementById('handCanvas');if(!cvs)return;
  const r=window.devicePixelRatio||1,w=cvs.offsetWidth||360,h=190;
  cvs.width=w*r;cvs.height=h*r;ctx=cvs.getContext('2d');ctx.scale(r,r);
  ctx.lineCap='round';ctx.lineJoin='round';drawGuides(w,h);
  cvs.addEventListener('pointerdown',onDown,{passive:false});
  cvs.addEventListener('pointermove',onMove,{passive:false});
  cvs.addEventListener('pointerup',onUp,{passive:false});
  cvs.addEventListener('pointercancel',onUp,{passive:false});
}
function drawGuides(w,h){
  ctx.save();ctx.strokeStyle='#e0d8c6';ctx.lineWidth=1;
  [.38,.65,.88].forEach(r=>{ctx.beginPath();ctx.moveTo(0,h*r);ctx.lineTo(w,h*r);ctx.stroke();});
  ctx.restore();
}
function getXY(e){const r=cvs.getBoundingClientRect();return[e.clientX-r.left,e.clientY-r.top];}
function onDown(e){
  e.preventDefault();isDrawing=true;
  const[x,y]=getXY(e);ctx.beginPath();ctx.moveTo(x,y);
  ctx.lineWidth=2.5+(e.pressure||.5)*2.5;ctx.strokeStyle='#1a1512';
}
function onMove(e){
  e.preventDefault();if(!isDrawing)return;
  const[x,y]=getXY(e);ctx.lineWidth=2.5+(e.pressure||.5)*2.5;
  ctx.lineTo(x,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);
}
function onUp(){isDrawing=false;}
function clearCanvas(){if(!ctx||!cvs)return;ctx.clearRect(0,0,cvs.offsetWidth,190);drawGuides(cvs.offsetWidth,190);}

// ── State ─────────────────────────────────────────────────────
let phase='photos',wordOrder=[],wIdx=0,subPhase='input';
let wordResults=[],completedWords=[];
let slotContents={},poolSet=new Set();
let tapSel=null,pnd=null,ghost=null,isDrag=false;
let photos=[],resultSaved=false;

// ── Result DB (shared Supabase-backed API also used by the portfolio dashboard) ──
const API_BASE='https://portfolio-dashboard-hmwa.onrender.com';
async function saveResultToDB(r){
  if(resultSaved)return;
  resultSaved=true;
  try{
    await fetch(API_BASE+'/quiz/results',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({allOk:r.allOk,total:r.total,dictOk:r.dictOk,dictTot:r.dictTot,mapOk:r.mapOk,mapTot:r.mapTot})
    });
  }catch(e){/* 오프라인 등으로 저장 실패해도 화면의 결과 자체는 이미 보이므로 조용히 무시 */}
}
async function showHistory(){
  document.getElementById('historyOverlay').style.display='flex';
  const body=document.getElementById('historyBody');
  body.innerHTML='<div class="history-empty">불러오는 중...</div>';
  try{
    const res=await fetch(API_BASE+'/quiz/results');
    const data=await res.json();
    const list=(data.results||[]).slice().reverse();
    if(!list.length){body.innerHTML='<div class="history-empty">아직 저장된 기록이 없습니다.</div>';return;}
    body.innerHTML=list.map(r=>`
      <div class="history-row">
        <div class="history-row-top"><b>${r.label||''}</b><span>${r.date||''} ${r.time||''}</span></div>
        <div class="history-row-score">${r.allOk} / ${r.total} · 받아쓰기 ${r.dictOk}/${r.dictTot} · 매칭 ${r.mapOk}/${r.mapTot}</div>
      </div>`).join('');
  }catch(e){
    body.innerHTML='<div class="history-empty">불러오기 실패했습니다. 인터넷 연결을 확인하세요.</div>';
  }
}
function closeHistory(){document.getElementById('historyOverlay').style.display='none';}

// ── Photo upload (reference photos for the week's word list) ──
function loadStoredPhotos(){
  try{const raw=localStorage.getItem('wq_photos_v1');photos=raw?JSON.parse(raw):[];}catch(e){photos=[];}
}
function savePhotosToStorage(){
  try{localStorage.setItem('wq_photos_v1',JSON.stringify(photos));}catch(e){/* 저장 공간 초과 등은 조용히 무시 */}
}
function resizeImage(file,maxDim,quality){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>h){if(w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}}
        else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject;img.src=reader.result;
    };
    reader.onerror=reject;reader.readAsDataURL(file);
  });
}
function pickPhoto(idx){
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';
  input.onchange=async()=>{
    const file=input.files[0];if(!file)return;
    try{
      photos[idx]=await resizeImage(file,900,0.75);
      savePhotosToStorage();
      renderPhotoSlot(idx);
    }catch(e){/* 이미지 처리 실패 시 그냥 무시 */}
  };
  input.click();
}
function removePhoto(idx,e){
  e.stopPropagation();
  photos[idx]=null;
  savePhotosToStorage();
  renderPhotoSlot(idx);
}
function renderPhotoSlot(idx){
  const el=document.getElementById('photo-slot-'+idx);if(!el)return;
  if(photos[idx]){
    el.innerHTML=`<img src="${photos[idx]}"><button class="photo-remove" onclick="removePhoto(${idx},event)">✕</button>`;
  }else{
    el.innerHTML='<span class="plus">+</span>';
  }
}

function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function esc(s){return s.replace(/'/g,"\\'");}

function startQuiz(){
  wordOrder=shuffle(WORDS.map((_,i)=>i));
  slotContents={};poolSet=new Set(shuffle([...SA_ALL]));
  wordResults=[];completedWords=[];resultSaved=false;wIdx=0;subPhase='input';phase='quiz';render();
}
function showConfirm(){
  document.getElementById('checkRow').style.display='none';
  document.getElementById('confirmRow').style.display='block';
}
function onConfirmCheck(){
  document.getElementById('confirmBtn').disabled=!document.getElementById('confirmCheck').checked;
}
function gradeMatchSlots(w){
  const wk=w.word;
  [['syn',w.syn],['ant',w.ant],['pos',w.pos]].forEach(([type,correct])=>{
    const slotId=wk+'-'+type;
    const el=document.getElementById('slot-'+slotId);
    if(!el)return;
    const val=slotContents[slotId];
    if(!correct){
      if(val){
        el.classList.add('slot-wrong');
        const tag=document.createElement('span');
        tag.className='slot-ans-tag';
        tag.textContent='정답 없음';
        el.appendChild(tag);
      }
      return;
    }
    const ok=val&&val.toLowerCase()===correct.toLowerCase();
    el.classList.add(ok?'slot-correct':'slot-wrong');
    if(!ok){
      const tag=document.createElement('span');
      tag.className='slot-ans-tag';
      tag.textContent=(val?'':'미입력 · ')+'정답: '+correct;
      el.appendChild(tag);
    }
  });
}
function revealWord(){
  const w=WORDS[wordOrder[wIdx]];
  document.getElementById('answerReveal').style.display='block';
  document.getElementById('gradeRow').style.display='flex';
  document.getElementById('checkRow').style.display='none';
  document.getElementById('confirmRow').style.display='none';
  if(cvs)cvs.style.pointerEvents='none';
  const cb=document.getElementById('clearBtn');if(cb)cb.style.display='none';
  document.querySelectorAll('.slot-zone').forEach(el=>el.classList.add('locked'));
  gradeMatchSlots(w);
  subPhase='revealed';
  speakWord3x(w.word,'soundBtn');
}
function gradeDictation(ok){
  wordResults.push({word:WORDS[wordOrder[wIdx]].word,dictOk:ok});
  document.getElementById('gradeRow').style.display='none';
  document.getElementById('nextBtn').style.display='block';
}
function nextWord(){
  completedWords.push(WORDS[wordOrder[wIdx]].word);
  wIdx++;
  if(wIdx>=wordOrder.length){phase='result';render();return;}
  subPhase='input';tapSel=null;render();
}
function prevWord(){
  if(wIdx<=0)return;
  wIdx--;
  completedWords.length=wIdx;
  const wk=WORDS[wordOrder[wIdx]].word;
  wordResults=wordResults.filter(r=>r.word!==wk);
  ['syn','ant','pos'].forEach(t=>{
    const sid=wk+'-'+t,val=slotContents[sid];
    if(val){if(!isPOS(val))poolSet.add(val);delete slotContents[sid];}
  });
  subPhase='input';tapSel=null;render();
}

// ── Drag & Drop ───────────────────────────────────────────────
function rejectFlash(slotId){
  const el=document.getElementById('slot-'+slotId);
  if(!el)return;
  el.classList.add('reject-flash');
  setTimeout(()=>el.classList.remove('reject-flash'),350);
}
function onChipDown(e,answer,isP,fromSlot){
  e.preventDefault();e.stopPropagation();
  if(subPhase==='revealed')return;
  pnd={answer,isP,fromSlot,sx:e.clientX,sy:e.clientY};isDrag=false;
  document.addEventListener('pointermove',onDragMove);
  document.addEventListener('pointerup',onDragUp);
  document.addEventListener('pointercancel',cancelDrag);
}
function onDragMove(e){
  if(!pnd)return;
  const dx=e.clientX-pnd.sx,dy=e.clientY-pnd.sy;
  if(!isDrag&&Math.sqrt(dx*dx+dy*dy)>6){
    isDrag=true;
    ghost=document.createElement('span');
    ghost.className=`chip ghost-chip ${pnd.isP?'pos-chip':'sa-chip'}`;
    ghost.textContent=pnd.answer;document.body.appendChild(ghost);
    if(pnd.fromSlot){delete slotContents[pnd.fromSlot];updateSlot(pnd.fromSlot);}
    else if(!pnd.isP){poolSet.delete(pnd.answer);updatePool();}
    tapSel=null;updatePool();
  }
  if(!isDrag)return;
  e.preventDefault();
  if(ghost){ghost.style.left=(e.clientX-35)+'px';ghost.style.top=(e.clientY-14)+'px';}
  document.querySelectorAll('.slot-zone.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const els=document.elementsFromPoint(e.clientX,e.clientY);
  const s=els.find(el=>el.classList&&el.classList.contains('slot-zone')&&!el.classList.contains('locked'));
  if(s&&canDrop(s.dataset.slotId,pnd.isP))s.classList.add('drag-over');
}
function onDragUp(e){
  document.removeEventListener('pointermove',onDragMove);
  document.removeEventListener('pointerup',onDragUp);
  document.removeEventListener('pointercancel',cancelDrag);
  document.querySelectorAll('.slot-zone.drag-over').forEach(el=>el.classList.remove('drag-over'));
  if(ghost){ghost.remove();ghost=null;}
  if(!isDrag){handleTap(pnd);pnd=null;isDrag=false;return;}
  const els=document.elementsFromPoint(e.clientX,e.clientY);
  const s=els.find(el=>el.classList&&el.classList.contains('slot-zone')&&!el.classList.contains('locked'));
  if(s){
    if(canDrop(s.dataset.slotId,pnd.isP))dropInSlot(s.dataset.slotId,pnd.answer,pnd.isP);
    else{
      rejectFlash(s.dataset.slotId);
      // return chip to origin
      if(pnd.fromSlot){slotContents[pnd.fromSlot]=pnd.answer;updateSlot(pnd.fromSlot);}
      else{if(!pnd.isP)poolSet.add(pnd.answer);updatePool();}
    }
  }else{
    if(pnd.fromSlot){slotContents[pnd.fromSlot]=pnd.answer;updateSlot(pnd.fromSlot);}
    else{if(!pnd.isP)poolSet.add(pnd.answer);updatePool();}
  }
  pnd=null;isDrag=false;
}
function cancelDrag(){
  document.removeEventListener('pointermove',onDragMove);
  document.removeEventListener('pointerup',onDragUp);
  document.removeEventListener('pointercancel',cancelDrag);
  if(ghost){ghost.remove();ghost=null;}
  if(pnd){
    if(pnd.fromSlot){slotContents[pnd.fromSlot]=pnd.answer;updateSlot(pnd.fromSlot);}
    else{if(!pnd.isP)poolSet.add(pnd.answer);updatePool();}
  }
  pnd=null;isDrag=false;
}
function handleTap(p){
  if(subPhase==='revealed')return;
  if(p.fromSlot){
    // tapping a chip already sitting in a slot cancels it back to the pool
    delete slotContents[p.fromSlot];
    if(!p.isP)poolSet.add(p.answer);
    updateSlot(p.fromSlot);updatePool();
    return;
  }
  if(tapSel){
    if(tapSel.answer===p.answer&&tapSel.fromSlot===p.fromSlot){
      if(!tapSel.isP)poolSet.add(tapSel.answer);
      tapSel=null;updatePool();return;
    }
    if(!tapSel.isP)poolSet.add(tapSel.answer);
  }
  tapSel={...p};
  if(!p.isP)poolSet.delete(p.answer);
  updatePool();
}
function handleSlotClick(slotId){
  if(subPhase==='revealed')return;
  if(tapSel){
    if(!canDrop(slotId,tapSel.isP)){rejectFlash(slotId);return;}
    dropInSlot(slotId,tapSel.answer,tapSel.isP);tapSel=null;updatePool();return;
  }
  const ex=slotContents[slotId];
  if(ex){
    // tapping a filled, unselected slot cancels its chip back to the pool
    delete slotContents[slotId];
    if(!isPOS(ex))poolSet.add(ex);
    updateSlot(slotId);updatePool();
  }
}
function dropInSlot(slotId,answer,isP){
  const old=slotContents[slotId];if(old&&!isPOS(old))poolSet.add(old);
  slotContents[slotId]=answer;if(!isP)poolSet.delete(answer);
  updateSlot(slotId);updatePool();
}
function updatePool(){
  const posPool=document.getElementById('pos-pool');
  const saPool=document.getElementById('sa-pool');
  if(!posPool||!saPool)return;
  posPool.innerHTML=POS_VALS.map(p=>{
    const sel=tapSel&&tapSel.answer===p&&tapSel.isP;
    return `<span class="chip pos-chip${sel?' selected':''}" onpointerdown="onChipDown(event,'${p}',true,null)">${p}</span>`;
  }).join('');
  saPool.innerHTML=[...poolSet].map(a=>{
    const sel=tapSel&&tapSel.answer===a&&!tapSel.isP&&!tapSel.fromSlot;
    return `<span class="chip sa-chip${sel?' selected':''}" onpointerdown="onChipDown(event,'${esc(a)}',false,null)">${a}</span>`;
  }).join('');
  const sb=document.getElementById('sel-badge');
  if(sb)sb.textContent=tapSel?`✦ "${tapSel.answer}" 선택됨 — 슬롯을 탭하세요`:'';
}
function updateSlot(slotId){
  const el=document.getElementById('slot-'+slotId);if(!el)return;
  const ans=slotContents[slotId],isSel=tapSel&&tapSel.fromSlot===slotId;
  el.classList.toggle('has-chip',!!ans);
  if(ans){
    const iP=isPOS(ans),sel=tapSel&&tapSel.answer===ans&&tapSel.fromSlot===slotId;
    el.innerHTML=`<span class="chip in-slot ${iP?'pos-chip':'sa-chip'}${sel?' selected':''}" onpointerdown="onChipDown(event,'${esc(ans)}',${iP},'${slotId}')">${ans} <span class="chip-remove">✕</span></span>`;
  }else if(isSel){
    el.innerHTML='<span style="font-size:.68rem;color:var(--gold)">✦ 선택됨</span>';
  }else{el.innerHTML='';}
}

// ── Result ─────────────────────────────────────────────────────
function buildResult(){
  const dictMap={};wordResults.forEach(r=>dictMap[r.word]=r.dictOk);
  let dictOk=0,dictTot=WORDS.length,mapOk=0,mapTot=0;
  wordResults.forEach(r=>{if(r.dictOk)dictOk++;});
  WORDS.forEach(w=>{
    if(w.syn){mapTot++;if((slotContents[w.word+'-syn']||'').toLowerCase()===w.syn.toLowerCase())mapOk++;}
    else if(slotContents[w.word+'-syn']){mapTot++;}
    if(w.ant){mapTot++;if((slotContents[w.word+'-ant']||'').toLowerCase()===w.ant.toLowerCase())mapOk++;}
    else if(slotContents[w.word+'-ant']){mapTot++;}
    mapTot++;if((slotContents[w.word+'-pos']||'').toLowerCase()===w.pos.toLowerCase())mapOk++;
  });
  const total=dictTot+mapTot,allOk=dictOk+mapOk;
  const emoji=allOk===total?'🌟':allOk>=total*.8?'👍':'💪';
  const msg=allOk===total?'완벽해요!':allOk>=total*.8?'잘했어요!':'다시 도전!';

  // Build table rows (WORDS order, 1-15)
  const rows=WORDS.map((w,i)=>{
    const dOk=dictMap[w.word];
    const spellCell=`<span class="${dOk?'spell-ok':'spell-no'}">${w.word} ${dOk?'✓':'✗'}</span>`;

    const mkCell=(userVal,correct,hasAnswer)=>{
      if(!hasAnswer){
        if(!userVal) return `<span class="cell-na">—</span>`;
        return `<span class="cell-no">${userVal} ✗<span class="cell-ans">정답 없음</span></span>`;
      }
      if(!userVal) return `<span class="cell-no">없음 ✗<span class="cell-ans">${correct}</span></span>`;
      const ok=userVal.toLowerCase()===correct.toLowerCase();
      if(ok) return `<span class="cell-ok">${userVal} ✓</span>`;
      return `<span class="cell-no">${userVal} ✗<span class="cell-ans">${correct}</span></span>`;
    };

    const synCell=mkCell(slotContents[w.word+'-syn'],w.syn,!!w.syn);
    const antCell=mkCell(slotContents[w.word+'-ant'],w.ant,!!w.ant);
    const posCell=mkCell(slotContents[w.word+'-pos'],w.pos,true);

    return `<tr>
      <td><span class="num">${i+1}</span></td>
      <td>${spellCell}</td>
      <td>${synCell}</td>
      <td>${antCell}</td>
      <td>${posCell}</td>
    </tr>`;
  }).join('');

  return{allOk,total,dictOk,dictTot,mapOk,mapTot,emoji,msg,rows};
}

// ── Render ────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');

  if(phase==='photos'){
    document.getElementById('progressFill').style.width='0%';
    app.innerHTML=`<div class="photo-screen">
      <div style="font-size:2.2rem">📷</div>
      <h2>이번 주 단어 사진 업로드</h2>
      <p class="photo-hint">이번 주 단어 목록이 담긴 사진을 최대 4장까지 올려주세요.<br>
        업로드하지 않고 다음을 눌러도 이전에 올린 사진을 그대로 사용합니다.</p>
      <div class="photo-grid">
        ${[0,1,2,3].map(i=>`<div class="photo-slot" id="photo-slot-${i}" onclick="pickPhoto(${i})"></div>`).join('')}
      </div>
      <button class="start-btn" onclick="phase='start';render();">다음 →</button>
    </div>`;
    [0,1,2,3].forEach(renderPhotoSlot);
    return;
  }

  if(phase==='start'){
    document.getElementById('progressFill').style.width='0%';
    app.innerHTML=`<div style="text-align:center;padding:22px 8px">
      <div style="font-size:2.4rem">📖</div><h2>WEEK 20 영단어 시험</h2>
      <p style="color:#5c5345;line-height:1.8;font-size:.92rem">
        왼쪽: 단어 받아쓰기 (펜으로)<br>오른쪽: 동의어 · 반의어 · 품사 드래그 배치<br>15단어 완료 후 자동 채점
      </p>
      <button class="start-btn" onclick="startQuiz()">시험 시작 →</button>
    </div>`;
    return;
  }

  if(phase==='quiz'){
    const pct=Math.round((wIdx/WORDS.length)*100);
    document.getElementById('progressFill').style.width=pct+'%';
    const w=WORDS[wordOrder[wIdx]],wk=w.word;
    app.innerHTML=`
    <div class="stage-nav">
      <button class="prev-btn" onclick="prevWord()" ${wIdx===0?'disabled':''}>← 이전 단어</button>
      <div class="stage-label">${wIdx+1} / ${WORDS.length} 단어</div>
    </div>
    <div class="top-btns">
      <button class="top-btn sound" id="soundBtn" onclick="speakWord3x('${esc(wk)}','soundBtn')">🔊 발음 3회<span class="spin"></span></button>
      <button class="top-btn hint"  id="hintBtn"  onclick="speakOnce('${esc(w.example)}','hintBtn')">💡 예문<span class="spin"></span></button>
    </div>
    <div class="main-area">
      <div class="left-panel">
        <div class="canvas-wrap">
          <canvas id="handCanvas"></canvas>
          <button class="canvas-clear" id="clearBtn" onclick="clearCanvas()">지우기</button>
        </div>
        <div class="answer-reveal" id="answerReveal"><div class="lbl">정답</div><div class="wrd">${wk}</div></div>
        <div class="grade-row" id="gradeRow">
          <button class="grade-btn ok" onclick="gradeDictation(true)">✓ Spelling 맞음</button>
          <button class="grade-btn no" onclick="gradeDictation(false)">✗ Spelling 틀림</button>
        </div>
        <div class="check-row" id="checkRow"><button class="check-btn" onclick="showConfirm()">확인하기 →</button></div>
        <div class="confirm-row" id="confirmRow">
          <label class="confirm-check"><input type="checkbox" id="confirmCheck" onchange="onConfirmCheck()"> Synonym · Antonym · Part of Speech 모두 입력했나요?</label>
          <button class="check-btn" id="confirmBtn" onclick="revealWord()" disabled>확인 →</button>
        </div>
        <button class="next-btn" id="nextBtn" onclick="nextWord()">${wIdx+1<WORDS.length?'다음 단어 →':'결과 보기 →'}</button>
      </div>
      <div class="mid-panel">
        <div class="slot-group">
          <div class="slot-row">
            <div class="slot-lbl lbl-syn">Synonym</div>
            <div class="slot-zone" id="slot-${wk}-syn" data-slot-id="${wk}-syn" onclick="handleSlotClick('${wk}-syn')"></div>
          </div>
          <div class="slot-row">
            <div class="slot-lbl lbl-ant">Antonym</div>
            <div class="slot-zone" id="slot-${wk}-ant" data-slot-id="${wk}-ant" onclick="handleSlotClick('${wk}-ant')"></div>
          </div>
          <div class="slot-row">
            <div class="slot-lbl lbl-pos">Part of Speech</div>
            <div class="slot-zone" id="slot-${wk}-pos" data-slot-id="${wk}-pos" onclick="handleSlotClick('${wk}-pos')"></div>
          </div>
        </div>
      </div>
      <div class="side-panel">
        <div class="completed-box">
          <div class="completed-lbl">완료 ${completedWords.length} / ${WORDS.length}</div>
          <div class="completed-list">${completedWords.length?completedWords.map((cw,i)=>`<span class="completed-chip">${i+1}. ${cw}</span>`).join(''):'<span class="completed-empty">아직 완료한 단어 없음</span>'}</div>
        </div>
      </div>
    </div>
    <div class="pool-section">
      <div class="pool-row">
        <span class="pool-lbl">동의어/반의어</span>
        <div class="pool-chips-inner" id="sa-pool"></div>
      </div>
      <div class="pool-row">
        <span class="pool-lbl">품사</span>
        <div class="pool-chips-inner" id="pos-pool"></div>
      </div>
      <div class="sel-badge" id="sel-badge"></div>
    </div>`;
    ['syn','ant','pos'].forEach(t=>{const sid=wk+'-'+t;if(slotContents[sid])updateSlot(sid);});
    updatePool();
    requestAnimationFrame(()=>requestAnimationFrame(initCanvas));
    return;
  }

  if(phase==='result'){
    document.getElementById('progressFill').style.width='100%';
    const result=buildResult();
    const{allOk,total,dictOk,dictTot,mapOk,mapTot,emoji,msg,rows}=result;
    saveResultToDB(result);
    app.innerHTML=`
    <div style="background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 14px;box-shadow:0 2px 0 var(--line)">
      <div class="result-header">
        <div style="font-size:.85rem;color:#8a7f6a">최종 결과 ${emoji} ${msg}</div>
        <div class="result-score-big">${allOk} <span style="font-size:1.4rem;color:#8a7f6a">/ ${total}</span></div>
        <div class="score-pills">
          <span class="pill dict">받아쓰기 ${dictOk} / ${dictTot}</span>
          <span class="pill match">매칭 ${mapOk} / ${mapTot}</span>
        </div>
      </div>
      <div class="res-table-wrap">
        <table class="res-table">
          <thead><tr>
            <th>#</th>
            <th>Spelling</th>
            <th style="color:var(--rust)">Synonym</th>
            <th style="color:var(--navy)">Antonym</th>
            <th style="color:var(--good)">품사</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <button class="restart-btn" onclick="location.reload()">다시 시작</button>
    </div>`;
  }
}

speechSynthesis.onvoiceschanged=()=>{};speechSynthesis.getVoices();
loadStoredPhotos();
render();
</script>
